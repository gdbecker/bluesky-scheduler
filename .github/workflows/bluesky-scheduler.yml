name: Bluesky Scheduler

on:
  schedule:
    - cron: "*/15 * * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  post:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm install

      - name: Post due Bluesky posts
        run: npm run post-due
        env:
          BLUESKY_GDD_IDENTIFIER: ${{ secrets.BLUESKY_GDD_IDENTIFIER }}
          BLUESKY_GDD_APP_PASSWORD: ${{ secrets.BLUESKY_GDD_APP_PASSWORD }}
          BLUESKY_EDGE_IDENTIFIER: ${{ secrets.BLUESKY_EDGE_IDENTIFIER }}
          BLUESKY_EDGE_APP_PASSWORD: ${{ secrets.BLUESKY_EDGE_APP_PASSWORD }}

      - name: Commit posted status updates
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Mark Bluesky posts as posted"
          file_pattern: posts/**/*.json